<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="160" viewBox="0 0 1180 160" role="img" aria-label="RealEstateFinder LangGraph architecture">
  <rect width="1180" height="160" fill="#ffffff"/>
  <style>
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .terminal { fill: #ecfeff; stroke: #0e7490; stroke-width: 1.5; rx: 18; }
    .label { font: 13px Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .edge { stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="terminal" x="20" y="55" width="80" height="50"/>
  <text class="label" x="60" y="80">START</text>
  <rect class="node" x="130" y="55" width="115" height="50"/>
  <text class="label" x="187.5" y="80">state_loader</text>
  <rect class="node" x="275" y="55" width="125" height="50"/>
  <text class="label" x="337.5" y="80">listing_fetcher</text>
  <rect class="node" x="430" y="55" width="90" height="50"/>
  <text class="label" x="475" y="80">matcher</text>
  <rect class="node" x="550" y="55" width="90" height="50"/>
  <text class="label" x="595" y="80">Ranker</text>
  <rect class="node" x="670" y="55" width="95" height="50"/>
  <text class="label" x="717.5" y="80">presenter</text>
  <rect class="node" x="795" y="55" width="150" height="50"/>
  <text class="label" x="870" y="80">feedback_receiver</text>
  <rect class="node" x="975" y="55" width="165" height="50"/>
  <text class="label" x="1057.5" y="80">preference_updater</text>
  <path class="edge" d="M100 80 H130"/>
  <path class="edge" d="M245 80 H275"/>
  <path class="edge" d="M400 80 H430"/>
  <path class="edge" d="M520 80 H550"/>
  <path class="edge" d="M640 80 H670"/>
  <path class="edge" d="M765 80 H795"/>
  <path class="edge" d="M945 80 H975"/>
  <path class="edge" d="M1057.5 105 V135 H187.5 V105"/>
  <text class="label" x="625" y="130">state_saver checkpoints updated state to SQLite, then END</text>
</svg>
